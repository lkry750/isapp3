<!DOCTYPE html>

<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <script type="text/javascript" src="js/login.js"></script>

    <link rel="stylesheet" href="style.css" />

    <script>
      osql.requireLogin();

      $(document).ready(async function () {
        await login();
        await execSelectStatus();
      });

      async function execSelectStatus() {
        var me = await osql.getMe();
        var sql = `
            select Borrowings.id, title, copy_no, userid, role, checkoutDate from Books
            left join BookTitle on Books.isbn = BookTitle.isbn
            left join Borrowings on Borrowings.uuid = Books.uuid
            left join Users on Users.id = Borrowings.userid
            where checkoutDate is not null and returnDate is null and userid = "${me.id}";
            `;
        var objects = await osql.connect(sql);
        console.log(objects);
        if (objects.length == 0){
          document.getElementById('book').innerHTML = '<div class="empty-message">借りている本はありません</div>';
          return;
        }
        var html = '';
        html += `<div class="admin-row my-library-row admin-header">`;
        html += `<div>本の名前</div>`;
        html += `<div>番号</div>`;
        html += `<div>借りた日</div>`;
        html += `</div>`;
        for (var i = 0; i < objects.length; i++) {
          var object = objects[i];
          html += `<div class="admin-row my-library-row">`;
          html += `<div class="admin-cell-title">${object.title}</div>`;
          html += `<div class="admin-cell-muted">No. ${object.copy_no}</div>`;
          html += `<div class="admin-cell-muted">${object.checkoutDate}</div>`;
          html += `</div>`;
        }
        document.getElementById('book').innerHTML = `<div class="admin-list">${html}</div>`;
      }
    </script>
  </head>

  <body>
    <div class="page-header">
      <div class="logo-banner">
        <a class="logo-link CLHeaderTitle" href="index.html">
          <img class="site-logo" src="bookry.jpg" alt="ブックリー" />
          <span>ブックリー</span>
        </a>
      </div>
      <div class="user-bar">
        ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
        <a href="javascript:logout()">logout</a>
      </div>
    </div>
    <hr />
    <h2>マイライブラリ</h2>
    <hr />
    <div id="book"></div>
  </body>
</html>
