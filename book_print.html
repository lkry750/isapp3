<!DOCTYPE html>

<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <script type="text/javascript" src="js/login.js"></script>
    <script type="text/javascript" src="js/admin.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.qrcode/1.0/jquery.qrcode.min.js"></script>

    <link rel="stylesheet" href="style.css" />

    <script>
      osql.requireLogin();

      $(document).ready(async function () {
        await login();
        await admin();
        displayBook();
      });

      async function displayBook() {
        var sql = `
            select BookTitle.title, Books.isbn,
            count(distinct Books.uuid) as total,
            count(distinct Books.uuid) - count(distinct case when checkoutDate is not null and returnDate is null then Books.uuid
            end)as stock
            from Books
            left join Borrowings on Borrowings.uuid = Books.uuid
            left join BookTitle on Books.isbn = BookTitle.isbn
            group by Books.isbn, BookTitle.title;
        `;
        var objects = await osql.connect(sql);
        console.log(objects);
        var html = '';
        html += `<div class="admin-row admin-book-row admin-header">`;
        html += `<div></div>`;
        html += `<div>本の名前</div>`;
        html += `<div>ISBN</div>`;
        html += `<div>在庫数</div>`;
        html += `</div>`;
        for (var i = 0; i < objects.length; i++) {
          var object = objects[i];
          html += `<div class="admin-row admin-book-row admin-row--button" onclick="toggleBookDetail('${object.isbn}')">`;
          html += `<div id="arrow-${object.isbn}">▶</div>`;
          html += `<div class="admin-cell-title">${object.title}</div>`;
          html += `<div class="admin-cell-muted">${object.isbn}</div>`;
          html += `<div class="admin-cell-stock">Stock: ${object.stock}/${object.total}</div>`;
          html += `</div>`;
          html += `<div id="detail-${object.isbn}"></div>`;
        }
        document.getElementById('result').innerHTML = `<div class="admin-list">${html}</div>`;
      }

      async function toggleBookDetail(isbn) {
        var detail = document.getElementById('detail-' + isbn);
        var arrow = document.getElementById('arrow-' + isbn);
        if (detail.innerHTML != '') {
          detail.innerHTML = '';
          arrow.innerHTML = '▶';
          return;
        }
        var sql = `select Books.uuid, copy_no, created_at, printed_at,
            case when Borrowings.checkoutDate is not null and Borrowings.returnDate is null
            then "貸出中" else "在架" end as status
            from Books
            left join Borrowings on Books.uuid = Borrowings.uuid
            and Borrowings.checkoutDate = (select Max(b.checkoutDate) from Borrowings b where b.uuid = Books.uuid)
            where isbn = '${isbn}'
            order by copy_no asc`;
        var objects = await osql.connect(sql);
        var html = '';
        for (var i = 0; i < objects.length; i++) {
          var object = objects[i];
          var checked = selectedBooks.some(function (book) {
            return book.uuid === object.uuid;
          })
            ? 'checked'
            : '';
          var statusClass = object.status === '在架' ? 'status-green' : 'status-red';
          html += `<div class="admin-detail-row">`;
          html += `<input type="checkbox" class="book-check" data-created-at="${object.created_at || ''}" data-copy-no="${object.copy_no || ''}" value="${object.uuid}" ${checked} onchange="changeCheck(this)">`;
          html += `<div>No. ${object.copy_no}</div>`;
          html += `<div class="book-status-inline ${statusClass}">${object.status}</div>`;
          html += `<div class="admin-detail-dates">`;
          html += `<span>追加日: ${object.created_at == null ? '----------------' : object.created_at}</span>`;
          html += `<span>印刷日: ${object.printed_at == null ? '未印刷' : object.printed_at}</span>`;
          html += `</div>`;
          html += `</div>`;
        }
        detail.innerHTML = `<div class="admin-detail">${html}</div>`;
        arrow.innerHTML = '▼';
      }

      var selectedBooks = [];

      function changeCheck(checkbox) {
        var uuid = checkbox.value;
        var createdAt = checkbox.dataset.createdAt || '';
        var copyNo = Number(checkbox.dataset.copyNo);
        if (Number.isNaN(copyNo)) {
          copyNo = 0;
        }
        if (checkbox.checked) {
          if (!selectedBooks.some(function (book) {
            return book.uuid === uuid;
          })) {
            selectedBooks.push({
              uuid: uuid,
              created_at: createdAt,
              copy_no: copyNo,
            });
          }
        } else {
          selectedBooks = selectedBooks.filter(function (book) {
            return book.uuid !== uuid;
          });
        }
      }

      function formatBookCode(createdAt, copyNo) {
        var copy = String(copyNo || 0).padStart(3, '0');
        if (!createdAt) {
          return `------${copy}`;
        }
        var match = createdAt.match(/(\d{4})-(\d{2})-(\d{2})/);
        if (!match) {
          return `------${copy}`;
        }
        var yy = match[1];//年の表示
        var mm = match[2];
        var dd = match[3];
        return `${yy}/${mm}/${dd}-${copy}`;
      }

      async function printSelectedBooks() {
        if (selectedBooks.length <= 0) {
          alert('印刷する本を選択してください');
          return;
        }
        var html = '';
        for (var i = 0; i < selectedBooks.length; i++) {
          var book = selectedBooks[i];
          var bookCode = formatBookCode(book.created_at, book.copy_no);
          html += `
          <div class="qr-box">
            <div id="qr-${book.uuid}"></div>
            <div class="lab">松澤研究室蔵書</div>
            <div class="book-code">${bookCode}</div>
          </div>
          `;
        }
        document.getElementById('qr').innerHTML = html;
        for (var i = 0; i < selectedBooks.length; i++) {
          var uuid = selectedBooks[i].uuid;
          $(`#qr-${uuid}`).qrcode({
            text: uuid,
            width: 380,
            height: 380,
          });
        }
        window.print();
        var ok = confirm('印刷できましたか？');
        if (ok) {
          var uuids = selectedBooks.map(function (book) {
            return book.uuid;
          });
          await updatePrintedAt(uuids);
          selectedBooks = [];
        }
      }

      async function updatePrintedAt(uuids) {
        var sql = '';
        for (var i = 0; i < uuids.length; i++) {
          sql += `update Books set printed_at = now() where uuid = '${uuids[i]}';`;
        }
        await osql.connect(sql);
        alert('状態を印刷済みに更新しました');
        displayBook();
      }
    </script>
  </head>

  <body>
    <div class="no-print">
      <div class="page-header">
        <div class="logo-banner">
          <a class="logo-link CLHeaderTitle" href="index.html">
            <img class="site-logo" src="bookry.jpg" alt="ブックリー" />
            <span>ブックリー</span>
          </a>
        </div>
        <div class="user-bar">
          ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
          <a href="javascript:logout()">logout</a>
        </div>
      </div>
      <hr />
      <h2>QR印刷</h2>
      <hr />
      <div id="result">読み込み中...</div>
      <div class="action-panel">
        <button onclick="printSelectedBooks()">選択した本を印刷する</button>
      </div>
    </div>
    <div id="qr"></div>
  </body>
</html>
