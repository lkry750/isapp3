<!DOCTYPE html>
<html>

  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <script type="text/javascript" src="js/login.js"></script>
    <script type="text/javascript" src="js/admin.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.qrcode/1.0/jquery.qrcode.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <script>
      osql.requireLogin();
      $(document).ready(async function () {
        await login();
        await admin();
        qrcode();
      });

      function qrcode() {
        // QRが小さくなって読めない,要検討
        var qr = createURL();

        var url =
          'https://mindcode.si.aoyama.ac.jp/' +
          'user_projects/' +
          'a8124018%40gsuite.si.aoyama.ac.jp/' +
          'f0848f6e-c797-41a5-a63f-aad2421ea462/' +
          qr;
        $('#qrcode').qrcode({
          text: url,
          width: 500,
          height: 500,
        });
      }

      function createURL() {
        var qr = osql.getParam('URL');
        if (qr == 'checkout'){
          document.getElementById('title').textContent = "借りるQR";
          return "scan.html?mode=checkout";
        }else if(qr == 'return'){
          document.getElementById('title').textContent = "返すQR";
          return "scan.html?mode=return";
        }else if(qr == 'search'){
          document.getElementById('title').textContent = "誰が借りているか確認するQR";
          return "scan.html?mode=search";
        }else if(qr == 'book_me'){
          document.getElementById('title').textContent = "借りている本を確認するQR";
          return "book_me.html";
        }
      }
    </script>
  </head>

  <body>
    <div class="page-header">
      <div class="logo-banner">
        <a class="logo-link CLHeaderTitle">
          <img class="site-logo" src="bookry.jpg" alt="ブックリー" />
          <span>ブックリー</span>
        </a>
      </div>
      <div class="user-bar">
        ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
        <a href="javascript:logout()">logout</a>
      </div>
    </div>
    <hr />
    <h2 id="title"></h2>
    <hr />
    <div id="qrcode"></div>
  </body>
</html>
