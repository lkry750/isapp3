<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <script type="text/javascript" src="js/login.js"></script>

    <link rel="stylesheet" href="style.css">

    <script>
        osql.requireLogin();

        $(document).ready(async function () {
            await login();
            await authority();
        });

        async function authority() {
            var me = await osql.getMe();
            var sql = `select role from Users where id = "${me.id}";`;
            var objects = await osql.connect(sql);
            var role = objects[0].role;
            if (role != 'teacher') return;
            document.getElementById('adminSeparator').style.display = 'block';
            document.getElementById('adminHeading').style.display = 'block';
            document.getElementById('admin').innerHTML = `<a href="admin.html">管理パネル</a>`;
            document.getElementById('add').innerHTML = `<a href="book_addition.html">本の追加</a>`;
            document.getElementById('print2').innerHTML = `<a href="book_print.html">本の印刷</a>`;
            document.getElementById('del').innerHTML = `<a href="book_delete.html">本の削除</a>`;
            document.getElementById('qr-h').innerHTML = `<a href="qr.html?URL=home">本を借りる・返すQR</a>`;
            document.getElementById('qr-s').innerHTML = `<a href="qr.html?URL=search">誰が借りているか確認するQR</a>`;
            document.getElementById('qr-m').innerHTML = `<a href="qr.html?URL=book_me">あなたが借りている本を確認するQR</a>`;
            document.getElementById('qr-p').innerHTML = `<a href="qr_print.html">QR作成&紙印刷</a>`;
        }
    </script>

</head>

<body>
    <div class="page-header">
        <div class="logo-banner">
            <a class="logo-link CLHeaderTitle" href="index.html">
                <img class="site-logo" src="bookry.jpg" alt="ブックリー" />
                <span>ブックリー</span>
            </a>
        </div>
        <div class="user-bar">
            ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
            <a href="javascript:logout()">logout</a>
        </div>
    </div>
    <hr>
    <h2>本の利用メニュー</h2>
    <hr>
    <div class="top-menu">
        <p><a href="scan.html?mode=router">借りる・返す</a></p>
        <p><a href="search.html">誰が借りているか確認する</a></p>
        <p><a href="book_me.html">あなたが借りている本を確認する</a></p>
    </div>
    <hr id="adminSeparator" style="display: none;">
    <div id="adminHeading" style="display: none;">
        <h2>管理する</h2>
        <hr>
    </div>
    <div class="admin-menu">
        <p id="admin"></p>
        <p id="add"></p>
        <p id="print2"></p>
        <p id="del"></p>
        <p id="qr-h"></p>
        <p id="qr-s"></p>
        <p id="qr-m"></p>
        <p id="qr-p"></p>
    </div>
</body>

</html>
