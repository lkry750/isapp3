<!DOCTYPE html>

<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <script type="text/javascript" src="js/login.js"></script>
    <script type="text/javascript" src="js/admin.js"></script>

    <link rel="stylesheet" href="style.css" />

    <script>
      osql.requireLogin();

      $(document).ready(async function () {
        await login();
        await admin();
        var isbn = osql.getParam('isbn');
        if (isbn != null) {
          await addBook(isbn);
          // リロード防止
          history.replaceState(null, null, 'book_addition.html');
        }
        displayBookList();
      });

      // books取得
      function getBookList() {
        var books = sessionStorage.getItem('books');
        if (books == null) return [];
        return JSON.parse(books);
      }

      // books保存
      function setBookList(books) {
        sessionStorage.setItem('books', JSON.stringify(books));
      }

      // 本追加
      async function addBook(isbn) {
        if (isbn.length != 13) return;
        var books = getBookList();
        for (var i = 0; i < books.length; i++) {
          if (books[i].isbn == isbn) {
            books[i].n++;
            setBookList(books);
            return;
          }
        }
        var title = await getTitle(isbn);
        books.push({
          isbn: isbn,
          title: title,
          n: 1,
        });
        setBookList(books);
      }

      // タイトル取得
      async function getTitle(isbn) {
        var sql = `select title from BookTitle where isbn = "${isbn}"`;
        var object = await osql.connect(sql);
        if (object.length > 0) {
          return object[0].title;
        }
        var url = 'https://api.openbd.jp/v1/get?isbn=' + isbn;
        var data = await $.getJSON(url);
        if (!data[0]) {
          return '取得できませんでした';
        }
        return data[0].summary.title;
      }

      // テーブル表示
      function displayBookList() {
        var books = getBookList();
        if (books.length <= 0) {
          document.getElementById('booklist').innerHTML = '';
          return;
        }
        var html = `<table border="1">`;
        for (var i = 0; i < books.length; i++) {
          html += `
                <tr>
                <td>${books[i].isbn}</td>
                <td>${books[i].title}</td>
                <td><input type="number" min="1" value="${books[i].n}" onchange="changeBookCount(${i}, this.value)"></td>
                <td><button onclick="removeBook(${i})">削除</button></td>
                </tr>
                `;
        }
        html += `</table>`;
        document.getElementById('booklist').innerHTML = html;
      }

      // 冊数変更
      function changeBookCount(index, value) {
        var books = getBookList();
        value = Number(value);
        if (!Number.isInteger(value) || value <= 0) {
          value = 1;
        }
        books[index].n = value;
        setBookList(books);
        displayBookList();
      }

      // 本削除
      function removeBook(index) {
        var books = getBookList();
        books.splice(index, 1);
        setBookList(books);
        displayBookList();
      }

      // 本追加
      async function execInsert() {
        var books = getBookList();
        if (books.length <= 0) {
          alert('本がありません');
          return;
        }
        for (var i = 0; i < books.length; i++) {
          // 登録されているか確認
          var sql1 = `select isbn from BookTitle where isbn = "${books[i].isbn}"`;
          var result = await osql.connect(sql1);
          if (result.length == 0) {
            var sql2 = `insert into BookTitle (isbn, title) values ("${books[i].isbn}", "${books[i].title}")`;
            await osql.connect(sql2);
          }
          // copy_no取得
          var sql3 = `select IFNULL(MAX(copy_no), 0) as max_no from Books where isbn = '${books[i].isbn}'`;
          var result3 = await osql.connect(sql3);
          var maxNo = Number(result3[0].max_no);
          // 冊数分追加
          var values = [];
          for (var j = 0; j < books[i].n; j++) {
            var copyNo = maxNo + j + 1;
            var uuid = crypto.randomUUID();
            values.push(`("${uuid}", "${books[i].isbn}", ${copyNo}, now())`);
          }
          // // データベース登録
          var sql4 = `insert into Books (uuid, isbn, copy_no, created_at)
                      values  ${values.join(',')}`;
          await osql.connect(sql4);
        }
        alert('登録しました');
        sessionStorage.removeItem('books');
        displayBookList();
      }

      function goScan() {
        location.replace('scan.html?mode=book_addition');
      }
    </script>
  </head>

  <body>
    <div class="page-header">
      <div class="logo-banner">
        <a class="logo-link CLHeaderTitle" href="index.html">
          <img class="site-logo" src="bookry.jpg" alt="ブックリー" />
          <span>ブックリー</span>
        </a>
      </div>
      <div class="user-bar">
        ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
        <a href="javascript:logout()">logout</a>
      </div>
    </div>
    <hr />
    <h2>本の追加</h2>
    <hr />
    <button onclick="goScan()">ISBNを読み取る</button>
    <div id="booklist"></div>
    <button onclick="execInsert()">選択した本を追加する</button>
  </body>
</html>
