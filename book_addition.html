<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <script type="text/javascript" src="js/login.js"></script>

    <link rel="stylesheet" href="style.css">

    <script>
        osql.requireLogin();

        $(document).ready(async function () {
            await login();
            execSelect();
            await bookinfo();
        });

        function execSelect() {
            var isbn = osql.getParam('isbn');
            document.getElementById('isbn').value = isbn;
        }

        async function execInsert() {
            var isbn = document.getElementById('isbn').value;
            var title = document.getElementById('title').value;
            var n = document.getElementById('n').value;
            if(isbn.length <= 0) {
                alert('ISBNを入力してください');
                return;
            }
            if (isbn.length != 13) {
                alert('ISBNが正しくありません');
                return;
            }
            //BookTitleを更新，Booksを追加
            var sql = ``;
            for (var i=0;i<n;i++){
                sql += `
            insert into BookTitle (isbn, title) values ('${isbn}','${title}')
            on duplicate key update title = values(title);
            insert into Books (uuid, isbn, created_at) values (uuid(), '${isbn}', now());
            `;
            }
            await osql.connect(sql);
            alert(`${title}を${n}冊追加しました`);
            execSelect();
            
            document.getElementById('isbn').value = "";
            document.getElementById('title').value = "";
            document.getElementById('n').value = "";
        }

        async function bookinfo() {
            var isbn = document.getElementById('isbn').value;
            if(isbn.length <= 0) return;
            if (isbn.length != 13) return;

            var sql = `select title from BookTitle where isbn = ${isbn}`;
            var object = await osql.connect(sql);
            if (object.length > 0){
                //DB
                document.getElementById('title').value = object[0].title;
                console.log(object[0].title);
            }else{
                //openBD
                var url = "https://api.openbd.jp/v1/get?isbn=" + isbn;
                $.getJSON(url, function(data) {
                    console.log(data);
                    if( !data[0] ) {
                        console.log('データがありません');
                        $("#title").val("取得できませんでした");
                        return;
                    }
                    $("#title").val(data[0].summary.title);
                });
            }            
        }

        function buttonPressed() {
            execInsert();
        }

        function up() {
            var n = document.getElementById('n').value;
            n++;
            document.getElementById('n').value = n;
        }

        function down() {
            var n = document.getElementById('n').value;
            if(n<=0) return;
            n--;
            document.getElementById('n').value = n;
        }

        function goScan() {
            sessionStorage.setItem("url", "book_addition.html");
            location.replace('scan.html');
        }

    </script>

</head>

<body>
    <h1>図書管理システム</h1>
    <div style="text-align: right;">
        ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
        <a href="javascript:logout()">logout</a>
    </div>
    <hr>
    <h2>本の追加</h2>
    <hr>
    <button onclick="goScan()">カメラ起動</button>
    <input id="isbn">
    <input id="title" style="width:400px;">
    <button onclick="down()">↓</button>
    <input id="n" value="1" style="width: 30px">
    <button onclick="up()">↑</button>
    <button onclick="buttonPressed()">追加</button>
</body>

</html>
