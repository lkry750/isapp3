<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <script type="text/javascript" src="js/login.js"></script>   
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.qrcode/1.0/jquery.qrcode.min.js"></script>

    <script>
        osql.requireLogin();

        $(document).ready(async function () {
            qrcode();
            await displayTitle();
        });

        function qrcode() {
            var uuid = osql.getParam('uuid');
            // QRが小さくなって読めないのであとで変更
            var url = "https://mindcode.si.aoyama.ac.jp/user_projects/a8124018%40gsuite.si.aoyama.ac.jp/f0848f6e-c797-41a5-a63f-aad2421ea462/router.html";
            $('#qrcode').qrcode({
                text: url + "?uuid=" + uuid,
                width: 200,
                height: 200
            });
        }

        async function displayTitle() {
            var uuid = osql.getParam('uuid');
            var sql = `
            select title from Books left join BookTitle on Books.isbn = BookTitle.isbn
            where Books.uuid = "${uuid}";
            `;
            var objects = await osql.connect(sql);
            var title = objects[0].title;
            document.getElementById('title').innerHTML = title;
        }

    </script>

</head>

<body>
    <div id="qrcode"></div>
    <span id="title"></span>
</body>

</html>
