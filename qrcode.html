<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <script type="text/javascript" src="js/login.js"></script>   
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.qrcode/1.0/jquery.qrcode.min.js"></script>
    <link rel="stylesheet" href="style.css" />

    <script>
        osql.requireLogin();

        $(document).ready(async function () {
            await qrcode();
            await displayTitle();
        });

        async function qrcode() {
            var uuid = osql.getParam('uuid');
            // tinyurlの処理
            var url = await tinyurl(uuid);
            // QRが小さくなって読めない,要検討
            // var url =
            // 'https://mindcode.si.aoyama.ac.jp/' +
            // 'user_projects/' +
            // 'a8124018%40gsuite.si.aoyama.ac.jp/' +
            // 'f0848f6e-c797-41a5-a63f-aad2421ea462/' +
            // `router.html?uuid=${uuid}`;
            $('#qrcode').qrcode({
                text: url,
                width: 500,
                height: 500
            });
        }

        async function tinyurl(uuid) {
            var sql = `select isbn, copy_no from Books where uuid = '${uuid}'`;
            var objects = await osql.connect(sql);
            var object = objects[0];
            return `https://tinyurl.com/${object.isbn}-${object.copy_no}`;
        }

        async function displayTitle() {
            var uuid = osql.getParam('uuid');
            var sql = `
            select title from Books left join BookTitle on Books.isbn = BookTitle.isbn
            where Books.uuid = "${uuid}";
            `;
            var objects = await osql.connect(sql);
            var title = objects[0].title;
            document.getElementById('title').innerHTML = title;
        }

    </script>

</head>

<body>
    <h1>図書管理システム</h1>
    <div style="text-align: right">
        ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
        <a href="javascript:logout()">logout</a>
    </div>
    <hr>
    <h2 id="title">QR表示</h2>
    <hr>
    <div id="qrcode"></div>
</body>

</html>
