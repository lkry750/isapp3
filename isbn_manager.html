<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <script type="text/javascript" src="js/login.js"></script>
    <script type="text/javascript" src="js/admin.js"></script>

    <link rel="stylesheet" href="style.css">

    <script>
        osql.requireLogin();

        $(document).ready(async function () {
            await login();
            await admin();
            await displayIsbn();
        });

        async function displayIsbn() {
            var isbn = osql.getParam('isbn');
            var sql = `select uuid, copy_no, created_at from Books where isbn = "${isbn}" order by copy_no desc;`;
            var objects = await osql.connect(sql);
            var html = "";
            for (var i=0;i<objects.length;i++){
                var object = objects[i];
                html += `<div class="box">`;
                html += `<div>No. ${object.copy_no} </div>`;
                html += `<div>追加日: ${object.created_at} </div>`;
                html += `<button onclick="button1Pressed('${object.uuid}')">QR</button>`;
                html += `<button onclick="deleteBook('${object.uuid}')">削除</button>`;
                html += `</div>`;
            }
            document.getElementById('tab1').innerHTML = html;
        }

        async function deleteBook(uuid) {
            var ok = confirm("本当に削除しますか?");
            if (!ok) return;
            var sql = `delete from Books where uuid = "${uuid}"`;
            var result = await osql.connect(sql);
            alert("削除しました");
            location.reload();
        }

        function button1Pressed(uuid) {
            location.href = 'qrcode.html?uuid=' + uuid;
        }

    </script>

</head>

<body>
    <h1>図書管理システム</h1>
    <div style="text-align: right;">
        ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
        <a href="javascript:logout()">logout</a>
    </div>
    <hr>
    <h2>管理者向け</h2>
    <hr>
    <div class="tab-switch">
        <label><input type="radio" name="tab" checked>本管理/詳細</label>
        <div class="tab-content" id="tab1">内容1</div>
    </div>

</body>

</html>
