<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <link rel="stylesheet" href="style.css">

    <script>
        osql.requireLogin();

        $(document).ready(async function () {
            var me = await osql.getMe();
            console.log(me);
            var sql = `insert ignore into Users (id, fname, lname) values('${me.id}', '${me.fname}', '${me.lname}');`;
            await osql.connect(sql);

            document.getElementById('firstname').innerHTML = me.fname;
            document.getElementById('lastname').innerHTML = me.lname;
            init();
        });

        function logout() {
            osql.logout();
        }

        function init() {
            var id = sessionStorage.getItem('pageid');
            document.getElementById('id').innerHTML = id;
            execSelect();
        }

        async function execSelect() {
            var pageid = sessionStorage.getItem('pageid');
            var sql = `select TITLE, Books.isbn, fname, lname, Borrowings.checkoutDate, Borrowings.returnDate from Books
            inner join BookTitle on BookTitle.ISBN = Books.isbn
            inner join Borrowings on Borrowings.uuid = Books.uuid
            inner join Users on Borrowings.userId = Users.id
            where Books.uuid = '${pageid}'`;
            var objects = await osql.connect(sql);
            console.log(objects);
            if (!objects.length) {
                document.getElementById('id').innerHTML = 'データがありません';
                return;
            };
            var html = "";
            for (var i = 0; i < objects.length; i++) {
                var object = objects[i];
                html = html + '<div class="book">';

                html = html + '<div class="line">'
                html = html + (i+1) + ' ' + object.lname + ' ' + object.fname + ' さん';
                html = html + '<span class="checkout">' + '貸出 : ' + object.checkoutDate + '</span>';
                html = html + '</div>'

                html = html + '<div class="line">'
                var returnDate = object.returnDate == null ? "------------------------------" : object.returnDate;
                html = html + '<span class="return">' + '返却 : ' + returnDate + '</span>';
                html = html + '</div>'

                html = html + '</div>';
            }
            document.getElementById('id').innerHTML = html;
        }
    </script>

</head>

<body>
    <h1>図書管理システム</h1>
    <div style="text-align: right;">
        ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
        <a href="javascript:logout()">logout</a>
    </div>
    <hr>
    <h2>本の管理</h2>
    <hr>
    <h3><span id="name">undefined</span>の履歴</h3>
    <h3 id="h3"></h3>
    <div id="id"></div>
</body>

</html>
