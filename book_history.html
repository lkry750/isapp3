<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>

    <script>
        osql.requireLogin();

        $(document).ready(async function () {
            var me = await osql.getMe();
            console.log(me);
            var sql = `insert ignore into Users (id, fname, lname) values('${me.id}', '${me.fname}', '${me.lname}');`;
            await osql.connect(sql);

            document.getElementById('firstname').innerHTML = me.fname;
            document.getElementById('lastname').innerHTML = me.lname;
            init();
        });

        function logout() {
            osql.logout();
        }

        function init() {
            var id = sessionStorage.getItem('pageid');
            document.getElementById('id').innerHTML = id;
            execSelect();
        }

        async function execSelect() {
            var id = sessionStorage.getItem('pageid');
            var sql = `select Books.title, Borrowings.userId, Users.id, Users.fname, Users.lname, Borrowings.checkoutDate, Borrowings.returnDate 
            from (Books
            inner join Borrowings on Borrowings.bookId = Books.id)
            inner join Users on Borrowings.userId = Users.id
            where Books.id = ${id}`;
            objects = await osql.connect(sql);
            console.log(objects);
            if (!objects.length) {
                document.getElementById('id').innerHTML = 'データがありません';
                return;
            };
            var html = "";
            html = html + '<table border="1">';
            for (var i = 0; i < objects.length; i++) {
            var object = objects[i];
                html = html + '<tr>';
                html = html + '<td>' + object.fname + '</td>';
                html = html + '<td>' + object.lname + '</td>';
                html = html + '<td>' + object.checkoutDate + '</td>';
                html = html + '<td>' + object.returnDate + '</td>';
                html = html + '</tr>';
            }
            html = html + '</table>';
            document.getElementById('id').innerHTML = html;
        }
    </script>

</head>

<body>
    <h1>図書管理システム</h1>
    <div style="text-align: right;">
        ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
        <a href="javascript:logout()">logout</a>
    </div>
    <hr>
    <h2>本の管理</h2>
    <hr>
    <h3 id="h3"></h3>
    <p id="id"></p>
</body>

</html>
