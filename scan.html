<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <script type="text/javascript" src="https://unpkg.com/html5-qrcode"></script>

    <script>
        osql.requireLogin();
        
        $(document).ready(async function () {
            var me = await osql.getMe();
            console.log(me);
            var sql = `insert ignore into Users (id, fname, lname) values('${me.id}', '${me.fname}', '${me.lname}');`;
            await osql.connect(sql);
            
            // document.getElementById('firstname').innerHTML = me.fname;
            // document.getElementById('lastname').innerHTML = me.lname;
            reader();
        });
        
        function logout() {
            osql.logout();
        }

        function reader() {
            var url = sessionStorage.getItem('url');

            //QRコード
            const html5QrCode = new Html5Qrcode("reader");

            html5QrCode.start(

                //カメラの指定
                { facingMode: "environment" },
                //読み取りの設定
                {
                fps: 10,
                qrbox: { width: 200, height: 200},
                aspectRatio: 1.0,
                disableFlip: true,
                formatsToSupport: [
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.QR_CODE
                ],
                experimentalFeatures: {useBarCodeDetectorIfSupported: false},
                },
                //読み取り成功時の処理
                (decodedText) => {
                    //isbnとQRコードで分岐
                    //正規表現というらしい
                    if(/^(97[89])\d{10}$/.test(decodedText)&&(url == "book_manager.html")) {
                        //isbnの処理
                        sessionStorage.setItem('isbn', decodedText);
                    }else if (/^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(decodedText)&&(url == "checkout.html")) {
                        //uuidの処理
                        sessionStorage.setItem('uuid', decodedText);
                    }    
                    console.log(decodedText);
                    html5QrCode.stop();
                    location.href = url;
                },
                // 読み取り失敗時の処理
                // (errorMessage) => {
                //     console.log(errorMessage);
                // }

                //isbnを読み取りたいときに別のものを読み取ってしまった時に，画面遷移するけど，データがないという状況がある．
            );
        }
        

        
    </script>
</head>

<body>
    <h1>QRコード</h1>
    <div id="reader" style="width:300px;"></div>
    <div id="result"></div>
</body>

</html>
