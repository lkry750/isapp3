<!DOCTYPE html>

<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <script type="text/javascript" src="js/login.js"></script>
    <script type="text/javascript" src="https://unpkg.com/html5-qrcode"></script>

    <link rel="stylesheet" href="style.css" />

    <script>
      osql.requireLogin();

      $(document).ready(async function () {
        display();
        reader();
      });

      function display() {
        var mode = osql.getParam('mode');

        var text = '';
        if (mode == 'checkout') {
          text = '借りる本のQRを読み込んでください';
        } else if (mode == 'return') {
          text = '返す本のQRを読み込んでください';
        } else if (mode == 'search') {
          text = '誰が借りているか確認する本のQRを<br>読み込んでください';
        } else if (mode == 'router') {
          text = '貸出/返却する本のQRを<br>読み込んでください';
        } else {
          text = 'ISBNを読み込んでください';
        }
        document.getElementById('text').innerHTML = text;
      }

      function reader() {
        var mode = osql.getParam('mode');

        //QRコード
        const html5QrCode = new Html5Qrcode('reader');

        html5QrCode.start(
          //カメラの指定
          { facingMode: 'environment' },
          //読み取りの設定
          {
            fps: 10,
            qrbox: { width: 200, height: 200 },
            aspectRatio: 1.0,
            disableFlip: true,
            formatsToSupport: [
              Html5QrcodeSupportedFormats.EAN_13,
              Html5QrcodeSupportedFormats.QR_CODE,
            ],
            experimentalFeatures: { useBarCodeDetectorIfSupported: false },
          },
          //読み取り成功時の処理
          async (decodedText) => {
            //isbnとQRコードで分岐

            //正規表現というらしい
            if (/^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(decodedText)) {
              if (mode == 'router'){
                mode = await checkMode(decodedText);
              }
              html5QrCode.stop();
              console.log(mode);
              location.replace(mode + '.html?uuid=' + decodedText);
            } else if (/^(97[89])\d{10}$/.test(decodedText)) {
              //isbnの処理
              sessionStorage.setItem('isbn', decodedText);
              var isbn = decodedText;

              html5QrCode.stop();
              location.replace(mode + '.html?isbn=' + isbn);
            } else {
              alert('QRコードが正しくないです');
            }
          }
          // 読み取り失敗時の処理
          // (errorMessage) => {
          //     console.log(errorMessage);
          // }

          //isbnを読み取りたいときに別のものを読み取ってしまった時に，画面遷移するけど，データがないという状況がある．
        );
      }

      async function checkMode(uuid) {
        var sql = `select Books.uuid, Books.isbn, BookTitle.title, Borrowings.userid,
        Borrowings.checkoutDate, Borrowings.returnDate,Users.fname, Users.lname, Users.id,
        case when Borrowings.checkoutDate is not null and Borrowings.returnDate is null
        then "貸出中" else "在架" end as status
        from Books
        left join BookTitle on Books.isbn = BookTitle.isbn
        left join Borrowings on Books.uuid = Borrowings.uuid
        and Borrowings.checkoutDate = (select Max(b.checkoutDate) from Borrowings b where b.uuid = Books.uuid)
        left join Users on Borrowings.userid = Users.id
        where Books.uuid = '${uuid}'`;
        var object = await osql.connect(sql);
        console.log(object);
        var status = object[0].status;
        console.log(status);
        mode = object[0].status == '貸出中' ? 'return' : 'checkout';
        return mode;
      }
    </script>
  </head>

  <body>
    <h1 id="text"></h1>
    <div id="reader" style="width: 300px"></div>
    <div id="result"></div>
  </body>
</html>
