<!DOCTYPE html>

<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <script type="text/javascript" src="js/login.js"></script>

    <link rel="stylesheet" href="style.css" />

    <script>
      osql.requireLogin();

      $(document).ready(async function () {
        await login();
        displayScan();
        await execSelect();
      });

      async function execSelect() {
        var uuid = osql.getParam('uuid');
        var me = await osql.getMe();
        console.log(uuid);
        if (!uuid) return;

        var sql = `select Books.uuid, Books.isbn, BookTitle.title, Borrowings.id, Borrowings.userid,
            Borrowings.checkoutDate, Borrowings.returnDate, Users.fname, Users.lname, 
            case when Borrowings.checkoutDate is not null and Borrowings.returnDate is null
            then "貸出中" else "在架" end as status
            from Books
            left join BookTitle on Books.isbn = BookTitle.isbn
            left join Borrowings on Books.uuid = Borrowings.uuid
            and Borrowings.checkoutDate = (select Max(b.checkoutDate) from Borrowings b where b.uuid = Books.uuid)
            left join Users on Borrowings.userid = Users.id
            where Books.uuid = '${uuid}';
            `;
        var objects = await osql.connect(sql);
        console.log(objects);

        var bookHtml = '';
        var statusHtml = '';
        var awaitingAction = false;
        for (var i = 0; i < objects.length; i++) {
          var object = objects[i];

          bookHtml += `<div class="box">`;
          bookHtml += `<div class="book-line">`;
          bookHtml += `<span class="book-title">${object.title}</span>`;
          bookHtml += `<span class="book-isbn">ISBN : ${object.isbn}</span>`;
          bookHtml += `</div>`;
          bookHtml += `</div>`;

          statusHtml += `<div class="box status-card">`;
          if (object.status == '貸出中') {
            if (me.id == object.userid) {
              statusHtml += `<span class="book-status-description">この本を返しますか？</span>`;
              statusHtml += `<div class="borrow-actions">`;
              statusHtml += `<button class="checkoutbutton checkoutbutton--secondary" onclick="cancelReturn()">キャンセル</button>`;
              statusHtml += `<button class="checkoutbutton" onclick="button2Pressed('${object.id}')">返す</button>`;
              statusHtml += `</div>`;
              awaitingAction = true;
            } else {
              statusHtml += `<span class="book-status-description">現在 ${object.fname} ${object.lname}さんが借りています</span>`;
            }
          } else if (object.status == '在架') {
            statusHtml += `<span class="book-status-description">この本はすでに返却されています</span>`;
          }
          statusHtml += `</div>`;
        }
        document.getElementById('result-book').innerHTML = bookHtml;
        document.getElementById('result-status').innerHTML = statusHtml;
        if (!awaitingAction) {
          showScanButton();
        }
      }

      async function execUpdate(id) {
        var sql = `update Borrowings set returnDate = now() where id = ${id}`;
        await osql.connect(sql);
        await execSelect();
        compReturn();
      }

      function buttonPressed() {
        execSelect();
      }

      function button2Pressed(id) {
        execUpdate(id);
      }

      function goScan() {
        location.replace('scan.html?mode=return');
      }

      function displayScan() {
        var uuid = osql.getParam('uuid');
        if (!uuid) {
          document.getElementById('scan').innerHTML =
            `<button onclick="goScan()">QRを読み取る</button>`;
        } else {
          document.getElementById('scan').innerHTML = '';
        }
      }

      function showScanButton() {
        document.getElementById('scan').innerHTML =
          `<button onclick="goScan()">他の本のQRを読み取る</button>`;
      }

      function cancelReturn() {
        document.getElementById('result-status').innerHTML = `
          <div class="box status-card"><span class="book-status-description">キャンセルしました</span></div>`;
        showScanButton();
      }

      function compReturn(){
        document.getElementById('result-status').innerHTML = `
          <div class="box status-card"><span class="book-status-description">返却が完了しました</span></div>`;
        showScanButton();
      }
    </script>
  </head>

  <body>
    <div class="page-header">
      <div class="logo-banner">
        <a class="logo-link CLHeaderTitle">
          <img class="site-logo" src="bookry.jpg" alt="ブックリー" />
          <span>ブックリー</span>
        </a>
      </div>
      <div class="user-bar">
        ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
        <a href="javascript:logout()">logout</a>
      </div>
    </div>
    <hr />
    <h2>本を返す</h2>
    <hr />
    <div>
      <div id="result-book"></div>
      <div id="result-status"></div>
    </div>
    <div class="action-panel">
      <div id="scan"></div>
    </div>
  </body>
</html>
