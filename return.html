<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <script type="text/javascript" src="js/login.js"></script>

    <link rel="stylesheet" href="style.css">

    <script>
        osql.requireLogin();

        $(document).ready(async function () {
            await login();
            await execSelect();
            displayId();
        });

        async function execSelect() {
            var me = await osql.getMe();
            var sql = `
            select Borrowings.id, title, userid, role, checkoutDate from Books
            left join BookTitle on Books.isbn = BookTitle.isbn
            left join Borrowings on Borrowings.uuid = Books.uuid
            left join Users on Users.id = Borrowings.userid
            where checkoutDate is not null and returnDate is null and userid = "${me.id}";`;
            var objects = await osql.connect(sql);
            console.log(objects);
            var html = "";
            for (var i=0;i<objects.length;i++){ 
                var object=objects[i]; 
                html += `<div class="box">`;
                html += `<div>${object.title}</div>`;
                html += `<div>${object.userid} (${object.role})</div>`;
                html += `<div>借りた日: ${object.checkoutDate}</div>`;
                html += `<button onclick="buttonPressed(${object.id})">返却</button>`;
                html += `</div>`;
            }
            document.getElementById('book').innerHTML = html;
        }
        
        function goScan() {
            sessionStorage.setItem("url", "return.html");
            location.href = 'scan.html';
        }

        function displayId() {
            var uuid = sessionStorage.getItem("uuid");
            if (uuid) {
                document.getElementById("uuid").value = uuid;
                sessionStorage.removeItem("uuid");
                // 返却する本の表示まだ
            }
        }

        function buttonPressed(id) {
            execUpdate(id);
        }

        async function execUpdate(id) {
            if (!confirm("本当に返却しますか？")) {
                return;
            }

            var sql = `update Borrowings set returnDate = now() where id = ${id}`;
            await osql.connect(sql);
            execSelect();
            alert('返却が完了しました');
        }
    </script>

</head>

<body>
    <h1>図書管理システム</h1>
    <div style="text-align: right;">
        ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
        <a href="javascript:logout()">logout</a>
    </div>
    <hr>
    <h2>返却</h2>
    <hr>
    UUID: <input id="uuid">
    <button onclick="goScan()">カメラ起動</button>
    <div>
        <h3>借りている本</h3>
        <hr>
        <div id="book"></div>
    </div>
</body>

</html>
