<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>

    <script>
        osql.requireLogin();

        $(document).ready(async function () {
            var me = await osql.getMe();
            console.log(me);
            var sql = `insert ignore into Users (id, fname, lname) values('${me.id}', '${me.fname}', '${me.lname}');`;
            await osql.connect(sql);

            document.getElementById('firstname').innerHTML = me.fname;
            document.getElementById('lastname').innerHTML = me.lname;
            execSelect();
        });

        function logout() {
            osql.logout();
        }

        async function execSelect() {
            var me = await osql.getMe();
            var sql = `select Borrowings.id, Books.title, Books.isbn, Borrowings.checkoutDate from Borrowings join Books on Borrowings.bookId = Books.id where Borrowings.userId = '${me.id}' and Borrowings.returnDate is null`;
            var objects = await osql.connect(sql);
            console.log(objects);
            var html = "";
            html = html + '<table border="1">';
            for (var i = 0; i < objects.length; i++) {
                html = html +'<tr>';
                var object = objects[i];
                html = html + '<td>' + object.title + '</td>';
                html = html + '<td>' + object.isbn + '</td>';
                html = html + '<td>' + object.checkoutDate + '</td>';
                html = html + '<td>' + '<button onclick="buttonPressed(\'' + object.id + '\')">返却</button>' + '</td>';
                html = html + '</tr>';
            }
            html = html + '</table>';
            document.getElementById('bookname').innerHTML = html;
        }

        function buttonPressed(id) {
            execUpdate(id);
        }

        async function execUpdate(id) {
            var sql = `update Borrowings set returnDate = now() where id = ${id}`;
            await osql.connect(sql);
            execSelect();
            alert('返却が完了しました');
        }
    </script>

</head>

<body>
    <h1>ISアプリ</h1>
    <div style="text-align: right;">
        ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
        <a href="javascript:logout()">logout</a>
    </div>
    <hr>
    <h2>返却</h2>
    <hr>
    <h3>借りている本</h3>
    <p id="bookname"></p>
</body>

</html>
