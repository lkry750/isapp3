<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <script type="text/javascript" src="js/login.js"></script>

    <link rel="stylesheet" href="style.css">

    <script>
        osql.requireLogin();

        $(document).ready(async function () {
            await login();
            await execSelect();
        });

        async function execSelect() {
            var uuid = osql.getParam('uuid');
            var me = await osql.getMe();
            console.log(uuid);
            if(!uuid) return;

            var sql = `select Books.uuid, Books.isbn, BookTitle.title, Borrowings.id, 
            Borrowings.checkoutDate, Borrowings.returnDate, userid,
            case when Borrowings.checkoutDate is not null and Borrowings.returnDate is null
            then "貸出中" else "在架" end as status
            from Books
            left join BookTitle on Books.isbn = BookTitle.isbn
            left join Borrowings on Books.uuid = Borrowings.uuid
            and Borrowings.checkoutDate = (select Max(b.checkoutDate) from Borrowings b where b.uuid = Books.uuid)
            where Books.uuid = '${uuid}';
            `;
            var objects = await osql.connect(sql);
            console.log(objects);

            var html = "";
            for (var i = 0; i < objects.length; i++) {
                var object = objects[i];

                html += `<div class="box">`;
                html += `<div class="book-line">`;
                html += `<span class="book-title">${object.title}</span>`;
                html += `<span class="book-isbn">ISBN : ${object.isbn}</span>`;
                html += `</div>`;

                html += `<div class="book-line">`;

                if (object.status == "貸出中") {
                    html += `<span class="status-red">貸出中</span>`;
                    if (me.id == object.userid && canReturn()) {
                        html += `<button class="checkoutbutton" onclick="button2Pressed('${object.id}')">返却</button>`;
                    }else if (me.id == object.userid) {
                        html += `<div>返却のためのQRを読み込んでください</div>`;
                    }
                } else if (object.status == "在架") {
                    html += `<span class="status-green">在架</span>`;
                }

                html += `</div>`;
                html += `</div>`;
            }
            document.getElementById('result').innerHTML = html;
        }

        function canReturn() {
            var expire = sessionStorage.getItem('return_expire');
            if (!expire) return false;
            if (Date.now() > Number(expire)) {
                sessionStorage.removeItem('return_expire');
                return false;
            }
            return true;
        }

        async function execUpdate(id) {
            if (!confirm("本当に返却しますか？")) {
                return;
            }
            var sql = `update Borrowings set returnDate = now() where id = ${id}`;
            await osql.connect(sql);
            await execSelect();
            alert('返却が完了しました');
        }

        function buttonPressed(){
            execSelect();
        }

        function button2Pressed(id) {
            execUpdate(id);
        }

        
        function goScan() {
            sessionStorage.setItem("url", "return.html");
            location.replace('scan.html');
        }
    </script>

</head>

<body>
    <div class="page-header">
        <h1><a class="logo-link" href="index.html">図書管理システム</a></h1>
        <div class="user-bar">
            ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
            <a href="javascript:logout()">logout</a>
        </div>
    </div>
    <hr>
    <h2>本を返す</h2>
    <hr>
    <div class="action-panel">
        <button onclick="goScan()">QRを読み取る</button>
    </div>
    <div>
        <div id="result"></div>
    </div>
</body>

</html>
