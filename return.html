<!DOCTYPE html>

<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <script type="text/javascript" src="js/login.js"></script>

    <link rel="stylesheet" href="style.css" />

    <script>
      osql.requireLogin();

      $(document).ready(async function () {
        await login();
        await execSelect();
        displayScan();
      });

      async function execSelect() {
        var uuid = osql.getParam('uuid');
        var me = await osql.getMe();
        console.log(uuid);
        if (!uuid) return;

        var sql = `select Books.uuid, Books.isbn, BookTitle.title, Borrowings.id, Borrowings.userid,
            Borrowings.checkoutDate, Borrowings.returnDate, Users.fname, Users.lname, 
            case when Borrowings.checkoutDate is not null and Borrowings.returnDate is null
            then "貸出中" else "在架" end as status
            from Books
            left join BookTitle on Books.isbn = BookTitle.isbn
            left join Borrowings on Books.uuid = Borrowings.uuid
            and Borrowings.checkoutDate = (select Max(b.checkoutDate) from Borrowings b where b.uuid = Books.uuid)
            left join Users on Borrowings.userid = Users.id
            where Books.uuid = '${uuid}';
            `;
        var objects = await osql.connect(sql);
        console.log(objects);

        var html = '';
        for (var i = 0; i < objects.length; i++) {
          var object = objects[i];

          html += `<div class="box">`;
          html += `<div class="book-line">`;
          html += `<span class="book-title">${object.title}</span>`;
          html += `<span class="book-isbn">ISBN : ${object.isbn}</span>`;
          html += `</div>`;

          html += `<div class="book-line">`;

          if (object.status == '貸出中') {
            if (me.id == object.userid) {
              html += `<span class="status-red">返せます</span>`;
              html += `<span class="book-status-description">この本を返しますか？</span>`;
            } else if (me.id != object.userid) {
              html += `<span class="status-red">返せません</span>`;
              html += `<span class="book-status-description">現在他の人が借りています</span>`;
            }
          } else if (object.status == '在架') {
            html += `<span class="status-green">返せました</span>`;
            html += `<span class="book-status-description">この本はすでに返却されています</span>`;
          }

          html += `</div>`;

          html += `<div class="book-line action-line">`;
          if (object.status == '貸出中' && me.id == object.userid) {
            html += `<button class="checkoutbutton" onclick="cancelReturn()">キャンセル</button>`;
            html += `<button class="checkoutbutton" onclick="button2Pressed('${object.id}')">返す</button>`;
          }
          html += `</div>`;

          html += `</div>`;
        }
        document.getElementById('result').innerHTML = html;
      }

      async function execUpdate(id) {
        if (!confirm('本当に返却しますか？')) {
          return;
        }
        var sql = `update Borrowings set returnDate = now() where id = ${id}`;
        await osql.connect(sql);
        await execSelect();
        alert('返却が完了しました');
        showScanButton();
      }

      function buttonPressed() {
        execSelect();
      }

      function button2Pressed(id) {
        execUpdate(id);
      }

      function goScan() {
        location.replace('scan.html?mode=return');
      }

      function displayScan() {
        var uuid = osql.getParam('uuid');
        if (!uuid) {
          document.getElementById('scan').innerHTML = `<button onclick="goScan()">QRを読み取る</button>`;
        } else {
          document.getElementById('scan').innerHTML = '';
        }
      }

      function showScanButton(label = '他の本のQRを読み取る') {
        document.getElementById('scan').innerHTML = `<button onclick="goScan()">${label}</button>`;
      }

      function cancelReturn() {
        document.getElementById('result').innerHTML = `
          <div class="box"><span class="book-status-description">キャンセルしました</span></div>`;
        showScanButton();
      }
    </script>
  </head>

  <body>
    <div class="page-header">
      <div class="logo-banner">
        <a class="logo-link CLHeaderTitle">
          <img class="site-logo" src="bookry.jpg" alt="ブックリー" />
          <span>ブックリー</span>
        </a>
      </div>
      <div class="user-bar">
        ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
        <a href="javascript:logout()">logout</a>
      </div>
    </div>
    <hr />
    <h2>本を返す</h2>
    <hr />
    <div>
      <div id="result"></div>
    </div>
    <div class="action-panel">
      <div id="scan"></div>
    </div>
  </body>
</html>
