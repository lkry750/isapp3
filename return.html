<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <link rel="stylesheet" href="style.css">

    <script>
        osql.requireLogin();

        $(document).ready(async function () {
            var me = await osql.getMe();
            console.log(me);
            var sql = `insert ignore into Users (id, fname, lname) values('${me.id}', '${me.fname}', '${me.lname}');`;
            await osql.connect(sql);

            document.getElementById('firstname').innerHTML = me.fname;
            document.getElementById('lastname').innerHTML = me.lname;
            execSelect();
        });

        function logout() {
            osql.logout();
        }

        async function execSelect() {//ここから
            var me = await osql.getMe();
            var sql = `select Borrowings.id, BookTitle.TITLE, Books.isbn, Borrowings.checkoutDate from Borrowings
            join Books on Borrowings.uuid = Books.uuid
            join BookTitle on BookTitle.ISBN = Books.isbn
            where Borrowings.userId = '${me.id}'
            and Borrowings.returnDate is null`;
            var objects = await osql.connect(sql);
            console.log(objects);
            if (objects.length == 0) {
                document.getElementById("bookname").innerHTML = "借りている本はありません";
                return;
            }
            var html = "";
            for (var i = 0; i < objects.length; i++) {
                var object = objects[i];

                html = html + '<div class="book-row">';

                html = html + '<div class="book-line">';
                html = html + '<span class="book-title">' + object.TITLE + '</span>';
                html = html + '</div>';

                html = html + '<div class="book-line">';
                html = html + '<span class="book-date">貸出日 : ' + object.checkoutDate + '</span>';
                html = html + '<button onclick="buttonPressed(\'' + object.id + '\')">返却</button>';
                html = html + '</div>';

                html = html + '</div>';
            }
            document.getElementById('bookname').innerHTML = html;
        }

        function buttonPressed(id) {
            execUpdate(id);
        }

        async function execUpdate(id) {
            if (!confirm("本当に返却しますか？")) {
                return;
            }

            var sql = `update Borrowings set returnDate = now() where id = ${id}`;
            await osql.connect(sql);
            execSelect();
            alert('返却が完了しました');
        }
    </script>

</head>

<body>
    <h1>図書管理システム</h1>
    <div style="text-align: right;">
        ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
        <a href="javascript:logout()">logout</a>
    </div>
    <hr>
    <h2>返却</h2>
    <hr>
    <br>
    <div class="box">
        <h3>借りている本</h3>
        <div id="bookname"></div>
    </div>
</body>

</html>
