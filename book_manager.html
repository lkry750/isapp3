<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <link rel="stylesheet" href="style.css">

    <script>
        osql.requireLogin();

        $(document).ready(async function () {
            var me = await osql.getMe();
            console.log(me);
            var sql = `insert ignore into Users (id, fname, lname) values('${me.id}', '${me.fname}', '${me.lname}');`;
            await osql.connect(sql);

            document.getElementById('firstname').innerHTML = me.fname;
            document.getElementById('lastname').innerHTML = me.lname;
            execSelect();
            bookinfo();
        });

        function logout() {
            osql.logout();
        }

        function buttonPressed() {
            execInsert();
        }

        async function execInsert() {
            var bookname = document.getElementById('bookname').value;
            var isbn = document.getElementById('isbn').value;

            if (isbn.length != 13) {
                alert('ISBNが正しくありません');
                return;
            }
            //本のisbnがなければ追加，あれば更新する
            var sql = `insert into BookTitle (ISBN, TITLE) values ('${isbn}','${bookname}')
            on duplicate key update TITLE = values(TITLE);
            insert into Books (uuid, isbn, created_at) values (uuid(), '${isbn}', now())`;
            await osql.connect(sql);
            alert(`${bookname}を追加しました`);
            execSelect();

            document.getElementById('bookname').value = "";
            document.getElementById('isbn').value = "";
        }

        async function execSelect() {
            var sql = `select Books.uuid, Books.isbn, BookTitle.TITLE, Borrowings.checkoutDate, Borrowings.returnDate,
            case when Borrowings.checkoutDate is not null and Borrowings.returnDate is null
            then "貸出中" else "在架" end as status
            from Books
            left join BookTitle on Books.isbn = BookTitle.isbn
            left join Borrowings on Books.uuid = Borrowings.uuid
            and Borrowings.checkoutDate = (select Max(b.checkoutDate) from Borrowings b where b.uuid = Books.uuid)
            order by BookTitle.TITLE asc;`;
            var objects = await osql.connect(sql);
            console.log(objects);
            var html = '';
            for (var i = 0; i < objects.length; i++) {
                var object = objects[i];
                html = html + '<div class="book">'

                html = html + '<div class="book-line">';
                html = html + '<span class="book-title">' + object.TITLE + '</span>';
                html = html + '<span class="book-isbn">ISBN : ' + object.isbn + '</span>';
                html = html + '</div>';

                html = html + '<div class="book-line">';
                html = html + '<button onclick="moveQR(\'' + object.uuid + '\')">QR</button>';
                html = html + '<button onclick="moveIdHistory(\'' + object.uuid + '\' , \'' + object.TITLE + '\')">id</button>';
                var statusClass = object.status === "在架" ? "status-green" : "status-red";
                html = html + '<div class="book-status">';
                html = html + '<span class="' + statusClass + '">' + object.status + '</span>';
                html = html + '</div>';
                html = html + '</div>';

                html = html + '</div>';
            }
            document.getElementById('result').innerHTML = html;
        }

        async function moveIdHistory(pageid,title) {
            sessionStorage.setItem("pageid", pageid);
            sessionStorage.setItem("title", title);
            location.href = 'book_history.html?id=' + pageid;
        }

        async function moveQR(pageid) {
            sessionStorage.setItem("pageid", pageid);
            location.href = 'qrcode.html?id=' + pageid;
        }

        function goScan() {
            sessionStorage.setItem("url", "book_manager.html");
            location.href = 'scan.html';
        }

        async function bookinfo() {
            var isbn = sessionStorage.getItem('isbn');
            document.getElementById('isbn').value = isbn;
            if(!isbn) {
                console.log('isbnがない');
                return;
            }
            //openBD
            var url = "https://api.openbd.jp/v1/get?isbn=" + isbn;

            $.getJSON(url, function(data) {
                console.log(data);
                if(!data || !data[0] || !data[0].summary) {
                    console.log('データがありません');
                    $("#bookname").val("取得できませんでした");
                    return;
                }
                $("#bookname").val(data[0].summary.title);
                sessionStorage.removeItem("isbn");
            });
        }

    </script>

</head>

<body>
    <h1>図書管理システム</h1>
    <div style="text-align: right;">
        ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
        <a href="javascript:logout()">logout</a>
    </div>
    <hr>
    <h2>本の管理</h2>
    <hr>
    <h3>本の登録</h3>
    <span >書名</span>
    <input id="bookname" value="" type="textfield">
    <br>
    <span >ISBN</span>
    <input id="isbn" value="" type="textfield">
    <button onclick="buttonPressed()">登録</button>
    <button onclick="goScan()">カメラ起動</button>
    <hr>
    <h3>登録済みの本</h3>
    <div id="result"></div>

</body>

</html>
