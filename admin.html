<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <script type="text/javascript" src="js/login.js"></script>
    <script type="text/javascript" src="js/admin.js"></script>

    <link rel="stylesheet" href="style.css">

    <script>
        osql.requireLogin();

        $(document).ready(async function () {
            login();
            admin();
            userSelect();
        });

        function logout() {
            osql.logout();
        }

        async function userSelect() {
            var sql = `select id, role from Users`;
            var objects = await osql.connect(sql);
            console.log(objects);
            var html = "";
            for(var i=0;i<objects.length;i++){
                var object = objects[i];
                html += '<div>';
                html += '<div>id: ' + object.id + '</div>';
                html += '<div>role: ' + object.role + '</div>';
                html += '</div>';
            }
            document.getElementById('tab1').innerHTML = html;
        }
    </script>

</head>

<body>
    <h1>図書管理システム</h1>
    <div style="text-align: right;">
        ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
        <a href="javascript:logout()">logout</a>
    </div>
    <hr>
    <h2>管理者向け</h2>
    <hr>
    <div class="tab-switch">
        <label><input type="radio" name="tab" checked>ユーザ管理</label>
        <div class="tab-content" id="tab1">内容1</div>

        <label><input type="radio" name="tab">本管理</label>
        <div class="tab-content" id="tab2">内容2</div>

        <label><input type="radio" name="tab">貸本管理</label>
        <div class="tab-content" id="tab3">内容3</div>
    </div>

</body>

</html>
