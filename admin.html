<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <script type="text/javascript" src="js/login.js"></script>
    <script type="text/javascript" src="js/admin.js"></script>

    <link rel="stylesheet" href="style.css">

    <script>
        osql.requireLogin();

        $(document).ready(async function () {
            login();
            admin();
            displayUser();
            displayBook();
            displayCheckout();
            displayLog();
        });

        async function displayUser() {
            var sql = `select id, role from Users`;
            var objects = await osql.connect(sql);
            console.log(objects);
            var html = "";
            for(var i=0;i<objects.length;i++){
                var object = objects[i];
                html += '<div class="box">';
                html += '<div>id: ' + object.id + '</div>';
                html += '<div>role: ' + object.role + '</div>';
                html += '</div>';
            }
            document.getElementById('tab1').innerHTML = html;
        }

        async function displayBook() {
            var sql = `
            select BookTitle.title, 
            Books.isbn, 
            count(distinct Books.uuid) as total,
            count(distinct Books.uuid) - count(distinct case when checkoutDate is not null and returnDate is null then Books.uuid end)as stock
            from Books
            left join Borrowings on Borrowings.uuid = Books.uuid
            left join BookTitle on Books.isbn = BookTitle.isbn
            group by Books.isbn, BookTitle.title;
            `;
            var objects = await osql.connect(sql);
            console.log(objects);
            var html = "";
            for (var i=0;i<objects.length;i++){
                var object = objects[i];
                html += '<div class="box">';
                html += '<div>Title: ' + object.title + '</div>';
                html += '<div>ISBN: ' + object.isbn + '</div>';
                html += '<div>Stock: ' + object.stock + '/' + object.total + '</div>';
                html += '</div>';
            }
            document.getElementById('tab2').innerHTML = html;
        }

        async function displayCheckout() {
            var sql = `
            select title, userid, checkoutDate from Books
            left join BookTitle on Books.isbn = BookTitle.isbn
            left join Borrowings on Borrowings.uuid = Books.uuid
            where checkoutDate is not null and returnDate is null;
            `;
            var objects = await osql.connect(sql);
            console.log(objects);
            var html = "";
            for (var i=0;i<objects.length;i++){
                var object = objects[i];
                html += '<div class="box">';
                html += '<div>Title: ' + object.title + '</div>';
                html += '<div>userid: ' + object.userid + '</div>';
                html += '<div>checkoutDate: ' + object.checkoutDate + '</div>';
                html += '</div>';
            }
            document.getElementById('tab3').innerHTML = html;
        }

        async function displayLog() {
            var sql = `
            select checkoutDate as Date, Books.isbn, title, userid, role, 'checkout' as action from Borrowings
            left join Books on Borrowings.uuid = Books.uuid
            left join BookTitle on Books.isbn = BookTitle.isbn
            left join Users on Borrowings.userid = Users.id
            union all
            select returnDate as Date, Books.isbn, title, userid, role, 'return' as action from Borrowings
            left join Books on Borrowings.uuid = Books.uuid
            left join BookTitle on Books.isbn = BookTitle.isbn
            left join Users on Borrowings.userid = Users.id
            where returnDate is not null
            order by Date;
            `;
            var objects = await osql.connect(sql);
            console.log(objects);
            var html = "";
            for (var i=0;i<objects.length;i++){
                var object = objects[i];
                html += '<div class="box">';
                html += '<div>Date: ' + object.Date + '</div>';
                html += '<div>isbn: ' + object.isbn + '</div>';
                html += '<div>title: ' + object.title + '</div>';
                html += '<div>userid: ' + object.userid + '</div>';
                html += '<div>role: ' + object.role + '</div>';
                html += '<div>action: ' + object.action + '</div>';
                html += '</div>';
            }
            document.getElementById('tab4').innerHTML = html;
        }
    </script>

</head>

<body>
    <h1>図書管理システム</h1>
    <div style="text-align: right;">
        ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
        <a href="javascript:logout()">logout</a>
    </div>
    <hr>
    <h2>管理者向け</h2>
    <hr>
    <div class="tab-switch">
        <label><input type="radio" name="tab">ユーザ管理</label>
        <div class="tab-content" id="tab1">内容1</div>

        <label><input type="radio" name="tab" checked>本管理</label>
        <div class="tab-content" id="tab2">内容2</div>

        <label><input type="radio" name="tab">貸本管理</label>
        <div class="tab-content" id="tab3">内容3</div>

        <label><input type="radio" name="tab">貸し借りの履歴</label>
        <div class="tab-content" id="tab4">内容4</div>
    </div>

</body>

</html>
