<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <link rel="stylesheet" href="style.css">

    <script>
        osql.requireLogin();

        $(document).ready(async function () {
            var me = await osql.getMe();
            console.log(me);
            var sql = `insert ignore into Users (id, fname, lname) values('${me.id}', '${me.fname}', '${me.lname}');`;
            await osql.connect(sql);

            document.getElementById('firstname').innerHTML = me.fname;
            document.getElementById('lastname').innerHTML = me.lname;

            uuidInput();
        });

        function logout() {
            osql.logout();
        }

        function buttonPressed() {
            execSelect();
        }

        async function execSelect() {
            var uuid = document.getElementById('uuid').value;

            var sql = `select Books.uuid, Books.isbn, BookTitle.TITLE, Borrowings.checkoutDate, Borrowings.returnDate,
            case when Borrowings.checkoutDate is not null and Borrowings.returnDate is null
            then "貸出中" else "在架" end as status
            from Books
            left join BookTitle on Books.isbn = BookTitle.isbn
            left join Borrowings on Books.uuid = Borrowings.uuid
            and Borrowings.checkoutDate = (select Max(b.checkoutDate) from Borrowings b where b.uuid = Books.uuid)
            where Books.uuid = '${uuid}';`;
            var objects = await osql.connect(sql);
            console.log(objects);

            var html = "";
            for (var i = 0; i < objects.length; i++) {
                var object = objects[i];
                
                html = html + '<div class="book-row">';

                html = html + '<div class="book-line">';
                html = html + '<span class="book-title">' + object.TITLE + '</span>';
                html = html + '<span class="book-isbn">ISBN : ' + object.isbn + '</span>';
                html = html + '</div>';

                html = html + '<div class="book-line">';

                if (object.status == "貸出中") {
                    html = html + '<span class="status-red">貸出中</span>';
                }else if (object.status == "在架") {
                    html = html + '<button class="checkoutbutton" onclick="button2Pressed(\'' + object.uuid + '\')">貸出</button>';
                }

                html = html + '</div>';

                html = html + '</div>';
            }
            document.getElementById('bookname').innerHTML = html;
        }

        function button2Pressed(id) {
            execInsert(id);
        }

        async function execInsert(id) {
            var me = await osql.getMe();

            var sql = `insert into Borrowings (uuid, userId, checkoutDate) values ('${id}', '${me.id}', now())`;
            await osql.connect(sql);
            document.getElementById('bookname').innerHTML = "本を借りました";
            document.getElementById('uuid').value = '';
        }

        function goScan() {
            sessionStorage.setItem("url", "checkout.html");
            location.href = 'scan.html';
        }

        function uuidInput() {
            var uuid = sessionStorage.getItem("uuid");
            if (uuid) {
                document.getElementById("uuid").value = uuid;
                sessionStorage.removeItem("uuid");
                buttonPressed();
            }
        }
    </script>

</head>

<body>
    <h1>図書管理システム</h1>
    <div style="text-align: right;">
        ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
        <a href="javascript:logout()">logout</a>
    </div>
    <hr>
    <h2>貸出</h2>
    <hr>
    <br>
    <div class="box">
        <h3>検索</h3>
        <span class="label">UUID</span>
        <input id="uuid" value="" type="textfield">
        <button onclick="buttonPressed()">検索</button>
        <button onclick="goScan()">カメラ起動</button>
        <br>
        <br>
        <div id="bookname"></div>
    </div>
</body>

</html>
