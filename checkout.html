<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>

    <script>
        osql.requireLogin();

        $(document).ready(async function () {
            var me = await osql.getMe();
            console.log(me);
            var sql = `insert ignore into Users (id, fname, lname) values('${me.id}', '${me.fname}', '${me.lname}');`;
            await osql.connect(sql);

            document.getElementById('firstname').innerHTML = me.fname;
            document.getElementById('lastname').innerHTML = me.lname;
        });

        function logout() {
            osql.logout();
        }

        function buttonPressed() {
            execSelect();
        }

        async function execSelect() {
            var isbn = document.getElementById('isbn').value;

            if (isbn.length != 13) {
                alert('ISBNが正しくありません');
                return;
            }

            var sql = `select * from Books where isbn = "${isbn}"`;
            var objects = await osql.connect(sql);
            console.log(objects);

            if (objects.length == 0) {
                alert('ISBNが正しくありません');
            }

            var html = "";
            html = html + '<table border="1">';
            for (var i = 0; i < objects.length; i++) {
                html = html +'<tr>';
                var object = objects[i];
                html = html + '<td>' + object.id + '</td>';
                html = html + '<td>' + object.title + '</td>';
                html = html + '<td>' + object.isbn + '</td>';
                html = html + '</tr>';
            }
            html = html + '</table>';
            document.getElementById('bookname').innerHTML = html;
            sessionStorage.setItem('bookid',object.id);
        }

        function button2Pressed() {
            execInsert()
        }

        async function execInsert() {
            var bookid = sessionStorage.getItem('bookid');
            var me = await osql.getMe();

            var sql = `insert into Borrowings (bookId, userId, checkoutDate) values (${bookid}, "${me.id}", now())`;
            await osql.connect(sql);
            document.getElementById('bookname').innerHTML = "本を借りました";
            document.getElementById('isbn').value = "";
        }
    </script>

</head>

<body>
    <h1>ISアプリ</h1>
    <div style="text-align: right;">
        ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
        <a href="javascript:logout()">logout</a>
    </div>
    <hr>
    <h2>貸出</h2>
    <hr>
    <h3>検索</h3>
    ISBN<input id="isbn" value="9784" type="textfield">
    <button onclick="buttonPressed()">検索</button>
    <p id="bookname"></p>
    <button onclick="button2Pressed()">貸出</button> 
</body>

</html>
