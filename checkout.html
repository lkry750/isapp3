<!DOCTYPE html>

<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script type="text/javascript" src="lib/jquery.min.js"></script>
    <script type="text/javascript" src="lib/osql.js"></script>
    <script type="text/javascript" src="js/login.js"></script>

    <link rel="stylesheet" href="style.css" />

    <script>
      osql.requireLogin();

      $(document).ready(async function () {
        await login();
        displayScan();
        await execSelect();
      });

      async function execSelect() {
        var uuid = osql.getParam('uuid');
        var me = await osql.getMe();
        console.log(uuid);
        if (!uuid) return;

        var sql = `select Books.uuid, Books.isbn, BookTitle.title, Borrowings.userid,
            Borrowings.checkoutDate, Borrowings.returnDate,Users.fname, Users.lname, Users.id,
            case when Borrowings.checkoutDate is not null and Borrowings.returnDate is null
            then "貸出中" else "在架" end as status
            from Books
            left join BookTitle on Books.isbn = BookTitle.isbn
            left join Borrowings on Books.uuid = Borrowings.uuid
            and Borrowings.checkoutDate = (select Max(b.checkoutDate) from Borrowings b where b.uuid = Books.uuid)
            left join Users on Borrowings.userid = Users.id
            where Books.uuid = '${uuid}';
            `;
        var objects = await osql.connect(sql);
        console.log(objects);

        var html = '';
        var html2 = '';
        for (var i = 0; i < objects.length; i++) {
          var object = objects[i];

          html += `<div class="box">`;
          html += `<div class="book-line">`;
          html += `<span class="book-title">${object.title}</span>`;
          html += `<span class="book-isbn">ISBN : ${object.isbn}</span>`;
          html += `</div>`;
          html += `</div>`;

          html2 += `<div class="box status-card">`;
          if (object.status == '貸出中') {
            if (me.id == object.userid) {
              html2 += `<span class="book-status-description">現在あなたが借りています</span>`;
            } else {
              html2 += `<span class="book-status-description">現在 ${object.fname} ${object.lname}さんが借りています</span>`;
            }
            showScanButton();
          } else if (object.status == '在架') {
            html2 += `<div class="status-message">`;
            html2 += `<span class="book-status-description status-question">この本を借りますか？</span>`;
            html2 += `</div>`;
            html2 += `<div class="borrow-actions">`;
            html2 += `<button class="checkoutbutton checkoutbutton--secondary" onclick="cancelCheckout()">キャンセル</button>`;
            html2 += `<button class="checkoutbutton checkoutbutton--primary" onclick="execInsert('${object.uuid}')">借りる</button>`;
            html2 += `</div>`;
          }
          html2 += `</div>`;
        }
        document.getElementById('result-book').innerHTML = html;
        document.getElementById('result-status').innerHTML = html2;
      }

      async function execInsert(id) {
        // 貸出中かチェック
        var me = await osql.getMe();
        var sql = `insert into Borrowings (uuid, userid, checkoutDate) values ('${id}', '${me.id}', now())`;
        await osql.connect(sql);
        await execSelect();
        compCheckout();
      }

      function goScan() {
        location.replace('scan.html?mode=checkout');
      }

      function displayScan() {
        var uuid = osql.getParam('uuid');
        if (!uuid) {
          document.getElementById('scan').innerHTML =
            `<button onclick="goScan()">QRを読み取る</button>`;
        } else {
          document.getElementById('scan').innerHTML = '';
        }
      }

      function showScanButton() {
        document.getElementById('scan').innerHTML =
          `<button onclick="goScan()">他の本のQRを読み取る</button>`;
      }

      function cancelCheckout() {
        document.getElementById('result-status').innerHTML = `
            <div class="box status-card"><span class="book-status-description">キャンセルしました</span></div>`;
        showScanButton();
      }

      function compCheckout(){
        document.getElementById('result-status').innerHTML = `
            <div class="box status-card"><span class="book-status-description">貸出が完了しました</span></div>`;
        showScanButton();
      }
    </script>
  </head>

  <body>
    <div class="page-header">
      <div class="logo-banner">
        <a class="logo-link CLHeaderTitle">
          <img class="site-logo" src="bookry.jpg" alt="ブックリー" />
          <span>ブックリー</span>
        </a>
      </div>
      <div class="user-bar">
        ようこそ<span id="lastname"></span> <span id="firstname"></span>さん
        <a href="javascript:logout()">logout</a>
      </div>
    </div>
    <hr />
    <h2>本を借りる</h2>
    <hr />
    <div>
      <div id="result-book"></div>
      <div id="result-status"></div>
    </div>
    <div id="scan" class="action-panel"></div>
  </body>
</html>
